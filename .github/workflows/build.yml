name: Build (reproduce hang)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: vite build (Vite 8 + rolldown)
    runs-on: ubuntu-latest
    # 15 minutes total budget so setup always completes; the build step has
    # its own 160-second limit (see below) where the actual timeout is demonstrated.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show Vite version
        run: npx vite --version

      - name: Show available memory
        # The build needs ~3 GB heap. On GitHub's ubuntu-latest (7 GB RAM, 2 CPUs)
        # memory is adequate but CPU is the binding constraint.
        # On self-hosted runners with < 3 GB available the process is OOM-killed (exit 137)
        # mid-build, which silently looks like a hang to the user.
        run: free -h

      - name: Build
        # On GitHub's 2-CPU runners the build takes ~3–4 minutes (184 s+);
        # we give it 160 s (2m 40s) so the step reliably fails in CI.
        # On faster local machines (4 CPUs, 3 GB+: ~2m 15s = 135 s) the step passes.
        # The timeout exit (code 124) proves the build is too slow for this CPU budget.
        # If you see exit code 137 instead, the runner ran out of memory.
        run: |
          echo "Starting build at $(date)"
          timeout 160 npm run build
          echo "Build finished at $(date)"

      - name: Upload build artefacts (if it ever finishes)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .svelte-kit/output
          retention-days: 3
