name: Build (reproduce hang)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: vite build (Vite 8 + rolldown)
    runs-on: ubuntu-latest
    # 10-minute timeout mirrors a typical CI pipeline limit.
    # With Vite 8 + rolldown and 10 000 routes the build is expected to
    # exceed this on GitHub's shared 2-CPU runners and time out.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Show Vite version
        run: npx vite --version

      - name: Build
        # Expected: hangs / times out here on Linux with Vite 8 + rolldown.
        # vite-plugin-sveltekit-guard consumes 56%+ of build time and
        # locks up indefinitely in constrained environments.
        # Local timing data (Docker, --cpus 0.5): 9m 48s  →  exceeds 10 min on CI.
        run: |
          echo "Starting build at $(date)"
          npm run build
          echo "Build finished at $(date)"

      - name: Upload build artefacts (if it ever finishes)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .svelte-kit/output
          retention-days: 3
