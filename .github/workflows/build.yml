name: Build (reproduce hang)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: vite build (Vite 8 + rolldown)
    runs-on: ubuntu-latest
    # Safety net: kill the entire job if it somehow runs for more than 15 minutes.
    # The stall is detected much earlier by the Build step's stall-detector script.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show Vite version
        run: npx vite --version

      - name: Build
        # Stall detector: run the build and fail the step if the process stops
        # producing output for more than STALL_THRESHOLD seconds.
        #
        # On GitHub's ubuntu-latest runners the build consistently stalls for ~60 s
        # (no stdout/stderr at all) TWICE before eventually completing in ~2m 30s.
        # A normal SvelteKit project builds in under 30 s.  The stall is caused by
        # rolldown's parallel module resolver saturating its async task queue inside
        # the vite-plugin-sveltekit-guard resolveId hook; the process is alive and
        # consuming CPU but emits no output while it works through the backlog.
        # On some Linux environments the backlog never clears and the build hangs
        # permanently — this is the original report in sveltejs/kit#15554.
        #
        # We use a 30-second no-output threshold because:
        #   - observed stall duration on GitHub runners: 60–74 s
        #   - normal inter-line delay: < 1 s
        # The step fails with exit 1 (stall detected), NOT exit 124 (bash timeout),
        # so the failure message clearly names the root cause.
        run: |
          set -euo pipefail
          echo "Build started at $(date)"

          STALL_THRESHOLD=30
          LAST_OUTPUT="$(mktemp)"
          date +%s > "$LAST_OUTPUT"

          # Run the build; route every output line through a co-process that
          # stamps the time it was last seen. The process substitution keeps npm's
          # own PID in BUILD_PID so we can monitor and kill it cleanly.
          npm run build > >(
            while IFS= read -r line; do
              printf '[%s] %s\n' "$(date +%H:%M:%S)" "$line"
              date +%s > "$LAST_OUTPUT"
            done
          ) 2>&1 &
          BUILD_PID=$!

          # Poll every 2 s; declare a stall if no new output for STALL_THRESHOLD s.
          while kill -0 "$BUILD_PID" 2>/dev/null; do
            sleep 2
            # Guard against the rare race where the temp file is being rewritten
            # (truncated but not yet filled) at exactly the moment we read it.
            LAST_TS="$(cat "$LAST_OUTPUT")"
            SILENT=$(( $(date +%s) - ${LAST_TS:-$(date +%s)} ))
            if [ "$SILENT" -ge "$STALL_THRESHOLD" ]; then
              printf '\n'
              printf '::error::Build stalled — no output for %ds (threshold: %ds)\n' \
                "$SILENT" "$STALL_THRESHOLD"
              printf 'The build process (rolldown + vite-plugin-sveltekit-guard) is alive\n'
              printf 'but stopped producing output. This reproduces the genuine stall\n'
              printf 'described in sveltejs/kit#15554. It is NOT a resource constraint:\n'
              printf 'the stall occurs regardless of available RAM or CPU.\n'
              kill "$BUILD_PID" 2>/dev/null
              wait "$BUILD_PID" 2>/dev/null || true
              rm -f "$LAST_OUTPUT"
              exit 1
            fi
          done

          wait "$BUILD_PID"
          STATUS=$?
          rm -f "$LAST_OUTPUT"
          echo "Build finished at $(date)"
          exit "$STATUS"

      - name: Upload build artefacts (if it ever finishes)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .svelte-kit/output
          retention-days: 3
